<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌍 全球金融热点 3D 可视化</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#000; overflow:hidden; font-family:'Arial',sans-serif; color:#fff; }
#app { display:flex; width:100vw; height:100vh; }

/* ── 地球区域 ── */
#globe-wrap { flex:1; position:relative; overflow:hidden; min-width:0; }
#canvas-container { width:100%; height:100%; }
canvas { display:block; }

/* ── 右侧面板 ── */
#news-panel {
  width:340px; flex-shrink:0;
  background:rgba(0,6,20,0.97);
  border-left:1px solid rgba(0,180,255,0.2);
  display:flex; flex-direction:column;
  height:100vh; overflow:hidden;
}
#panel-header {
  padding:16px 16px 10px;
  border-bottom:1px solid rgba(0,180,255,0.15);
  flex-shrink:0;
}
#panel-header h2 {
  font-size:13px; letter-spacing:3px; color:rgba(0,200,255,0.8);
  text-transform:uppercase; margin-bottom:10px;
}
#panel-filter { display:flex; flex-wrap:wrap; gap:5px; }
.filter-tag {
  font-size:10px; padding:3px 8px; border-radius:12px;
  border:1px solid rgba(255,255,255,0.15); color:rgba(255,255,255,0.5);
  cursor:pointer; transition:all 0.2s; letter-spacing:1px;
}
.filter-tag:hover { border-color:rgba(0,200,255,0.5); color:#fff; }
.filter-tag.active { background:rgba(0,200,255,0.15); border-color:#00c8ff; color:#00c8ff; }

#panel-list { flex:1; overflow-y:auto; scrollbar-width:thin; scrollbar-color:rgba(0,180,255,0.3) transparent; }
#panel-list::-webkit-scrollbar { width:4px; }
#panel-list::-webkit-scrollbar-thumb { background:rgba(0,180,255,0.3); border-radius:2px; }

.news-item {
  padding:12px 16px; border-bottom:1px solid rgba(255,255,255,0.05);
  cursor:pointer; transition:background 0.15s;
}
.news-item:hover { background:rgba(0,180,255,0.06); }
.news-item.active { background:rgba(0,180,255,0.1); border-left:2px solid #00c8ff; }
.news-item-top { display:flex; align-items:center; gap:7px; margin-bottom:5px; }
.news-cat-tag {
  font-size:9px; letter-spacing:1px; padding:1px 6px; border-radius:3px;
  font-weight:700; text-transform:uppercase; flex-shrink:0;
}
.news-title { font-size:12px; font-weight:700; line-height:1.4; color:#fff; margin-bottom:4px; }
.news-meta { display:flex; justify-content:space-between; font-size:10px; color:rgba(255,255,255,0.4); }
.news-time { color:rgba(0,200,255,0.5); }

#panel-footer {
  padding:10px 16px 12px; border-top:1px solid rgba(0,180,255,0.15);
  flex-shrink:0; display:flex; flex-direction:column; gap:6px;
}
#panel-footer .footer-title {
  font-size:9px; letter-spacing:2px; color:rgba(0,200,255,0.5);
  text-transform:uppercase; margin-bottom:2px;
}
#cat-summary {
  display:flex; flex-direction:column; gap:3px;
}
.cat-summary-row {
  display:flex; align-items:center; gap:6px;
}
.cat-summary-dot { width:6px; height:6px; border-radius:50%; flex-shrink:0; }
.cat-summary-name { font-size:10px; color:rgba(255,255,255,0.55); flex:1; }
.cat-summary-bar-wrap {
  width:60px; height:4px; background:rgba(255,255,255,0.07); border-radius:2px; overflow:hidden;
}
.cat-summary-bar { height:100%; border-radius:2px; transition:width 0.4s ease; }
.cat-summary-num { font-size:10px; font-weight:700; min-width:18px; text-align:right; }
#footer-meta {
  display:flex; justify-content:space-between; align-items:center;
  margin-top:4px; padding-top:6px; border-top:1px solid rgba(0,180,255,0.08);
}
#footer-meta .total-count { font-size:11px; font-weight:700; color:#00c8ff; }
#footer-meta .refresh-info { font-size:9px; color:rgba(255,255,255,0.3); }

/* ── HUD ── */
#hud { position:absolute; top:0;left:0;right:0;bottom:0; pointer-events:none; z-index:10; }
#top-bar {
  position:absolute; top:0;left:0;right:0; height:56px;
  background:linear-gradient(180deg,rgba(0,10,30,0.97) 0%,transparent 100%);
  display:flex; align-items:center; justify-content:space-between; padding:0 24px;
  border-bottom:1px solid rgba(0,180,255,0.2);
}
#title { font-size:16px; font-weight:700; letter-spacing:4px;
  background:linear-gradient(90deg,#00c8ff,#fff,#00ff88);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
#subtitle { font-size:9px; color:rgba(0,200,255,0.5); letter-spacing:2px; }
#stats { display:flex; gap:18px; }
.stat-item { text-align:center; }
.stat-num { font-size:18px; font-weight:700; color:#00c8ff; line-height:1; }
.stat-label { font-size:9px; color:rgba(255,255,255,0.35); letter-spacing:1px; margin-top:2px; }
#clock { font-size:12px; color:rgba(0,200,255,0.7); letter-spacing:2px; }

/* 角落 */
.corner { position:absolute; width:30px; height:30px; opacity:0.4; }
.corner-tl { top:64px;left:10px; border-top:2px solid #00c8ff; border-left:2px solid #00c8ff; }
.corner-tr { top:64px;right:354px; border-top:2px solid #00c8ff; border-right:2px solid #00c8ff; }
.corner-bl { bottom:36px;left:10px; border-bottom:2px solid #00c8ff; border-left:2px solid #00c8ff; }
.corner-br { bottom:36px;right:354px; border-bottom:2px solid #00c8ff; border-right:2px solid #00c8ff; }

/* 扫描线 */
#scanline {
  position:absolute; top:0;left:0;right:0; height:2px;
  background:linear-gradient(90deg,transparent,rgba(0,200,255,0.2),transparent);
  animation:scan 6s linear infinite; pointer-events:none;
}
@keyframes scan { 0%{top:0} 100%{top:100vh} }

/* 图例 */
#legend {
  position:absolute; left:16px; top:50%; transform:translateY(-50%);
  background:rgba(0,5,20,0.85); border:1px solid rgba(0,180,255,0.18);
  border-radius:8px; padding:10px 12px; min-width:110px;
}
#legend h4 { font-size:8px; letter-spacing:2px; color:rgba(0,200,255,0.5); margin-bottom:7px; text-transform:uppercase; }
.legend-item { display:flex; align-items:center; gap:6px; margin:4px 0; }
.legend-dot { width:8px;height:8px; border-radius:50%; flex-shrink:0; }
.legend-text { font-size:10px; color:rgba(255,255,255,0.7); }

/* 提示 */
#hint {
  position:absolute; bottom:44px; right:358px;
  font-size:9px; color:rgba(255,255,255,0.25); letter-spacing:1px;
  text-align:right; line-height:1.8;
}

/* 跑马灯 */
#ticker {
  position:absolute; bottom:0;left:0;right:340px; height:36px;
  background:rgba(0,5,20,0.97); border-top:1px solid rgba(0,180,255,0.18);
  display:flex; align-items:center; overflow:hidden;
}
#ticker-label {
  flex-shrink:0; background:#00c8ff; color:#000; font-size:9px;
  font-weight:700; letter-spacing:2px; padding:0 10px; height:100%;
  display:flex; align-items:center; text-transform:uppercase;
}
#ticker-track { display:flex; white-space:nowrap; animation:ticker 60s linear infinite; overflow:hidden; }
.ticker-item { display:inline-flex; align-items:center; gap:6px; padding:0 24px; font-size:11px; color:rgba(255,255,255,0.7); }
.ticker-dot { width:5px;height:5px; border-radius:50%; flex-shrink:0; }
@keyframes ticker { 0%{transform:translateX(0)} 100%{transform:translateX(-50%} }

/* ── 详情弹窗 ── */
#detail-modal {
  position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
  width:min(520px, 90vw);
  background:rgba(0,8,28,0.98);
  border:1px solid rgba(0,200,255,0.45);
  border-radius:14px; padding:24px;
  backdrop-filter:blur(20px);
  box-shadow:0 0 60px rgba(0,100,200,0.4), 0 0 120px rgba(0,50,150,0.2);
  z-index:50; display:none; max-height:80vh; overflow-y:auto;
}
#detail-modal.open { display:block; animation:fadeIn 0.2s ease; }
@keyframes fadeIn { from{opacity:0;transform:translate(-50%,-50%) scale(0.96)} to{opacity:1;transform:translate(-50%,-50%) scale(1)} }
#modal-close {
  position:absolute; top:12px; right:16px; background:none; border:none;
  color:rgba(255,255,255,0.5); font-size:20px; cursor:pointer; line-height:1;
}
#modal-close:hover { color:#fff; }
#modal-cat { font-size:9px; letter-spacing:2px; font-weight:700; padding:2px 8px; border-radius:3px; display:inline-block; margin-bottom:10px; text-transform:uppercase; }
#modal-title { font-size:17px; font-weight:700; color:#fff; line-height:1.4; margin-bottom:12px; }
#modal-desc { font-size:13px; color:rgba(255,255,255,0.7); line-height:1.7; margin-bottom:14px; }
#modal-impact { background:rgba(0,200,255,0.07); border:1px solid rgba(0,200,255,0.15); border-radius:8px; padding:12px; margin-bottom:14px; }
#modal-impact-label { font-size:9px; color:rgba(0,200,255,0.6); letter-spacing:2px; margin-bottom:5px; text-transform:uppercase; }
#modal-impact-text { font-size:12px; color:rgba(255,255,255,0.8); line-height:1.6; }
#modal-meta { display:flex; justify-content:space-between; font-size:11px; color:rgba(0,200,255,0.5); border-top:1px solid rgba(0,200,255,0.1); padding-top:12px; }
#modal-overlay {
  position:absolute; inset:0; background:rgba(0,0,0,0.4);
  z-index:49; display:none; backdrop-filter:blur(4px);
}
#modal-overlay.open { display:block; }

/* Loading */
#loading {
  position:absolute; inset:0; background:#000;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  z-index:100; transition:opacity 0.8s ease;
}
#loading.fade-out { opacity:0; pointer-events:none; }
.loading-ring {
  width:64px;height:64px; border:2px solid rgba(0,200,255,0.1);
  border-top-color:#00c8ff; border-radius:50%; animation:spin 1s linear infinite; margin-bottom:18px;
}
@keyframes spin{to{transform:rotate(360deg)}}
#loading-text { font-size:11px; letter-spacing:3px; color:rgba(0,200,255,0.7); text-transform:uppercase; }
#loading-progress { margin-top:10px; width:180px; height:2px; background:rgba(0,200,255,0.12); border-radius:2px; overflow:hidden; }
#loading-bar { height:100%; background:#00c8ff; width:0%; transition:width 0.3s ease; }

/* 标注点击高亮 */
.marker-highlight { position:absolute; pointer-events:none; z-index:30; }
</style>
</head>

    </div>

    <div id="modal-overlay"></div>
    <div id="detail-modal">

      <div id="modal-cat"></div>
      <div id="modal-title"></div>

      <div id="modal-meta">

      </div>
    </div>
  </div>
</div>

(function buildStars() {
  const N = 2500;
  const pos = new Float32Array(N * 3);
  for (let i = 0; i < N; i++) {
    const phi = Math.acos(2 * Math.random() - 1);
    const theta = Math.random() * Math.PI * 2;
    const r = 80 + Math.random() * 150;
    pos[i*3]   = r * Math.sin(phi) * Math.cos(theta);
    pos[i*3+1] = r * Math.sin(phi) * Math.sin(theta);
    pos[i*3+2] = r * Math.cos(phi);
  }
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  scene.add(new THREE.Points(geo, new THREE.PointsMaterial({
    color: 0xffffff, size: 0.25, transparent: true, opacity: 0.85,
    sizeAttenuation: true, depthWrite: false
  })));
})();

// 地图贴图生成
// ═══════════════════════════════════════════════
const TEX_W = 4096, TEX_H = 2048;

function setProgress(p, txt) {
  document.getElementById('loading-bar').style.width = p + '%';
  if (txt) document.getElementById('loading-text').textContent = txt;
}

async function buildEarthTextures() {
  setProgress(5, '请求地图数据...');
  let geojson;
  try {
    const res = await fetch('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json');
    const topo = await res.json();
    geojson = topoToGeo(topo, topo.objects.countries);
    setProgress(40, '解析地图...');
  } catch(e) {
    geojson = null;
  }

  setProgress(55, '绘制地球贴图...');

  // 昼面
  const dayCanvas = document.createElement('canvas');
  dayCanvas.width = TEX_W; dayCanvas.height = TEX_H;
  const dc = dayCanvas.getContext('2d');

  // 海洋
  const seaGrad = dc.createLinearGradient(0, 0, 0, TEX_H);
  seaGrad.addColorStop(0, '#0a1a3a');
  seaGrad.addColorStop(0.5, '#0d2a55');
  seaGrad.addColorStop(1, '#0a1a3a');
  dc.fillStyle = seaGrad;
  dc.fillRect(0, 0, TEX_W, TEX_H);

  // 海洋经纬网格
  dc.strokeStyle = 'rgba(30,80,160,0.15)';
  dc.lineWidth = 0.8;
  for (let lon = -180; lon <= 180; lon += 30) {
    const x = (lon + 180) / 360 * TEX_W;
    dc.beginPath(); dc.moveTo(x, 0); dc.lineTo(x, TEX_H); dc.stroke();
  }
  for (let lat = -90; lat <= 90; lat += 30) {
    const y = (90 - lat) / 180 * TEX_H;
    dc.beginPath(); dc.moveTo(0, y); dc.lineTo(TEX_W, y); dc.stroke();
  }

  if (geojson) {
    drawGeoJSON(dc, geojson, TEX_W, TEX_H);
  } else {
    drawFallbackLand(dc, TEX_W, TEX_H);
  }

  setProgress(75, '生成夜间贴图...');

  // 夜面
  const nightCanvas = document.createElement('canvas');
  nightCanvas.width = TEX_W; nightCanvas.height = TEX_H;
  const nc = nightCanvas.getContext('2d');
  nc.fillStyle = '#000005';
  nc.fillRect(0, 0, TEX_W, TEX_H);
  if (geojson) drawNightLights(nc, geojson, TEX_W, TEX_H);

  setProgress(88, '生成高光贴图...');

  // 高光
  const specCanvas = document.createElement('canvas');
  specCanvas.width = TEX_W; specCanvas.height = TEX_H;
  const sc = specCanvas.getContext('2d');
  sc.fillStyle = '#667788';
  sc.fillRect(0, 0, TEX_W, TEX_H);
  if (geojson) drawLandSpec(sc, geojson, TEX_W, TEX_H);

  setProgress(95, '构建3D场景...');

  return {
    day: new THREE.CanvasTexture(dayCanvas),
    night: new THREE.CanvasTexture(nightCanvas),
    spec: new THREE.CanvasTexture(specCanvas)
  };
}

function lonLatToCanvas(lon, lat, w, h) {
  return [(lon + 180) / 360 * w, (90 - lat) / 180 * h];
}

function drawGeoJSON(ctx, geojson, w, h) {
  ctx.save();
  geojson.features.forEach(f => {
    const geom = f.geometry;
    if (!geom) return;
    ctx.beginPath();
    drawGeometry(ctx, geom, w, h);
    const grad = ctx.createLinearGradient(0, 0, 0, h);
    grad.addColorStop(0,   '#2a5c2a');
    grad.addColorStop(0.3, '#3a7a30');
    grad.addColorStop(0.5, '#4a8a38');
    grad.addColorStop(0.7, '#3a7a30');
    grad.addColorStop(1,   '#1e4020');
    ctx.fillStyle = grad;
    ctx.fill();
    // ── 国界线（红色醒目）──
    ctx.strokeStyle = '#ff4444';
    ctx.lineWidth = 2.5;
    ctx.stroke();
  });
  ctx.restore();

  // 极地冰盖
  ctx.save();
  const iceGrad = ctx.createLinearGradient(0, 0, 0, h * 0.12);
  iceGrad.addColorStop(0, 'rgba(220,235,255,0.92)');
  iceGrad.addColorStop(1, 'rgba(180,210,240,0.0)');
  ctx.fillStyle = iceGrad;
  ctx.fillRect(0, 0, w, h * 0.11);
  const iceGrad2 = ctx.createLinearGradient(0, h * 0.88, 0, h);
  iceGrad2.addColorStop(0, 'rgba(220,235,255,0.0)');
  iceGrad2.addColorStop(1, 'rgba(235,245,255,0.95)');
  ctx.fillStyle = iceGrad2;
  ctx.fillRect(0, h * 0.88, w, h * 0.12);
  ctx.restore();

  addTerrainDetail(ctx, w, h);
}

function drawGeometry(ctx, geom, w, h) {
  const type = geom.type;
  const coords = geom.coordinates;
  if (type === 'Polygon') {
    drawRing(ctx, coords[0], w, h);
    for (let i = 1; i < coords.length; i++) drawHole(ctx, coords[i], w, h);
  } else if (type === 'MultiPolygon') {
    coords.forEach(poly => {
      drawRing(ctx, poly[0], w, h);
      for (let i = 1; i < poly.length; i++) drawHole(ctx, poly[i], w, h);
    });
  }
}

function drawRing(ctx, ring, w, h) {
  if (!ring || ring.length < 2) return;
  const [x0, y0] = lonLatToCanvas(ring[0][0], ring[0][1], w, h);
  ctx.moveTo(x0, y0);
  for (let i = 1; i < ring.length; i++) {
    const [x, y] = lonLatToCanvas(ring[i][0], ring[i][1], w, h);
    ctx.lineTo(x, y);
  }
  ctx.closePath();
}

function drawHole(ctx, ring, w, h) {
  if (!ring || ring.length < 2) return;
  const [x0, y0] = lonLatToCanvas(ring[0][0], ring[0][1], w, h);
  ctx.moveTo(x0, y0);
  for (let i = ring.length - 1; i >= 1; i--) {
    const [x, y] = lonLatToCanvas(ring[i][0], ring[i][1], w, h);
    ctx.lineTo(x, y);
  }
  ctx.closePath();
}

function addTerrainDetail(ctx, w, h) {
  const imgd = ctx.getImageData(0, 0, w, h);
  const data = imgd.data;
  for (let i = 0; i < data.length; i += 4) {
    const r = data[i], g = data[i+1], b = data[i+2];
    if (g > r + 5 && g > b) {
      const noise = (Math.random() - 0.5) * 18;
      data[i]   = Math.max(0, Math.min(255, r + noise * 0.6));
      data[i+1] = Math.max(0, Math.min(255, g + noise));
      data[i+2] = Math.max(0, Math.min(255, b + noise * 0.4));
    }
  }
  ctx.putImageData(imgd, 0, 0);
}

function drawNightLights(ctx, geojson, w, h) {
  const offscreen = document.createElement('canvas');
  offscreen.width = w; offscreen.height = h;
  const oc = offscreen.getContext('2d');
  oc.fillStyle = '#000';
  oc.fillRect(0, 0, w, h);
  geojson.features.forEach(f => {
    if (!f.geometry) return;
    oc.beginPath();
    drawGeometry(oc, f.geometry, w, h);
    oc.fillStyle = 'white';
    oc.fill();
  });
  const mask = oc.getImageData(0, 0, w, h);
  ctx.save();
  const NUM_LIGHTS = 8000;
  for (let k = 0; k < NUM_LIGHTS; k++) {
    const px = Math.floor(Math.random() * w);
    const py = Math.floor(Math.random() * h);
    const idx = (py * w + px) * 4;
    if (mask.data[idx] > 128) {
      const r = 1 + Math.random() * 2;
      const alpha = 0.3 + Math.random() * 0.5;
      const lon = px / w * 360 - 180;
      const lat = 90 - py / h * 180;
      let density = 0.15;
      if ((lon > -10 && lon < 40 && lat > 35 && lat < 60)) density = 0.85;
      if ((lon > 100 && lon < 145 && lat > 20 && lat < 45)) density = 0.90;
      if ((lon > -100 && lon < -65 && lat > 25 && lat < 50)) density = 0.80;
      if (Math.random() < density) {
        const grd = ctx.createRadialGradient(px,py,0,px,py,r*2);
        grd.addColorStop(0, `rgba(255,230,150,${alpha})`);
        grd.addColorStop(1, 'rgba(255,180,80,0)');
        ctx.fillStyle = grd;
        ctx.beginPath(); ctx.arc(px, py, r*2, 0, Math.PI*2); ctx.fill();
      }
    }
  }
  ctx.restore();
}

function drawLandSpec(ctx, geojson, w, h) {
  ctx.save();
  geojson.features.forEach(f => {
    if (!f.geometry) return;
    ctx.beginPath();
    drawGeometry(ctx, f.geometry, w, h);
    ctx.fillStyle = '#223322';
    ctx.fill();
  });
  ctx.restore();
}

function drawFallbackLand(ctx, w, h) {
  ctx.fillStyle = '#3a7a30';
  const blocks = [
    [-170,10,60,70],[-80,-55,40,10],[-20,-35,55,37],
    [0,35,150,72],[110,-45,155,10],[160,-50,180,10],
  ];
  blocks.forEach(([lon1,lat1,lon2,lat2]) => {
    const [x1,y1] = lonLatToCanvas(lon1,lat2,w,h);
    const [x2,y2] = lonLatToCanvas(lon2,lat1,w,h);
    ctx.fillRect(x1,y1,x2-x1,y2-y1);
  });
}

// TopoJSON解码
function topoToGeo(topology, object) {
  const arcs = topology.arcs;
  const scale = topology.transform ? topology.transform.scale : [1,1];
  const translate = topology.transform ? topology.transform.translate : [0,0];
  function decodeArc(arc) {
    let x = 0, y = 0;
    return arc.map(pt => { x += pt[0]; y += pt[1]; return [x * scale[0] + translate[0], y * scale[1] + translate[1]]; });
  }
  function getArc(i) { if (i < 0) return decodeArc(arcs[~i]).reverse(); return decodeArc(arcs[i]); }
  function ringToCoords(ring) { return ring.reduce((acc, idx) => acc.concat(getArc(idx)), []); }
  const features = object.geometries.map(geom => {
    let geometry;
    if (geom.type === 'Polygon') geometry = { type:'Polygon', coordinates: geom.arcs.map(ringToCoords) };
    else if (geom.type === 'MultiPolygon') geometry = { type:'MultiPolygon', coordinates: geom.arcs.map(poly => poly.map(ringToCoords)) };
    else geometry = null;
    return { type:'Feature', properties: geom.properties || {}, geometry };
  });
  return { type:'FeatureCollection', features };
}

let earthMesh, markerGroup, markerMeshes = [];
let rotX = 0.25, rotY = 0, targetRotX = 0.25, targetRotY = 0;
let isDragging = false, prevX = 0, prevY = 0;

async function init() {
  const textures = await buildEarthTextures();
  setProgress(98, '渲染中...');

  // 地球
  const earthGeo = new THREE.SphereGeometry(1, 128, 128);
  const earthMat = new THREE.MeshPhongMaterial({
    map: textures.day, specularMap: textures.spec,
    specular: new THREE.Color(0x334455), shininess: 35, bumpScale: 0.005
  });
  earthMesh = new THREE.Mesh(earthGeo, earthMat);
  scene.add(earthMesh);

  // 夜面着色器
  const nightGeo = new THREE.SphereGeometry(1.001, 128, 128);
  const nightShader = new THREE.ShaderMaterial({
    uniforms: {
      nightTex: { value: textures.night },
      sunDir:   { value: new THREE.Vector3(5,3,5).normalize() }
    },
    vertexShader: `
      varying vec3 vWorldNormal; varying vec2 vUv;
      void main() { vWorldNormal=normalize((modelMatrix*vec4(normal,0.0)).xyz); vUv=uv; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0); }`,
    fragmentShader: `
      uniform sampler2D nightTex; uniform vec3 sunDir; varying vec3 vWorldNormal; varying vec2 vUv;
      void main(){ float diff=dot(vWorldNormal,sunDir); float nightBlend=smoothstep(0.1,-0.25,diff); vec4 night=texture2D(nightTex,vUv); gl_FragColor=vec4(night.rgb,nightBlend*night.a*1.2); }`,
    transparent: true, depthWrite: false, blending: THREE.AdditiveBlending
  });
  scene.add(new THREE.Mesh(nightGeo, nightShader));

  // 大气
  const atmoMat = new THREE.ShaderMaterial({
    vertexShader: `varying vec3 vNormal; void main(){ vNormal=normalize(normalMatrix*normal); gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0); }`,
    fragmentShader: `varying vec3 vNormal; void main(){ float f=pow(1.0-abs(dot(vNormal,vec3(0,0,1))),2.8); vec3 col=mix(vec3(0.15,0.45,1.0),vec3(0.4,0.7,1.0),f); gl_FragColor=vec4(col,f*0.55); }`,
    transparent: true, side: THREE.FrontSide, depthWrite: false, blending: THREE.AdditiveBlending
  });
  scene.add(new THREE.Mesh(new THREE.SphereGeometry(1.04, 64, 64), atmoMat));

  // 云层
  const cloudCanvas = buildCloudTexture();
  const cloudMat = new THREE.MeshPhongMaterial({
    map: new THREE.CanvasTexture(cloudCanvas),
    transparent: true, opacity: 0.45, depthWrite: false, blending: THREE.NormalBlending
  });
  const cloudMesh = new THREE.Mesh(new THREE.SphereGeometry(1.012, 64, 64), cloudMat);
  scene.add(cloudMesh);
  cloudMesh._cloudMesh = true;

  // 新闻标注
  refreshNews();
  buildMarkers();

  // 弧线
  buildArcs();

  // 跑马灯
  buildTicker();

  // 右侧面板
  buildFilterTags();
  buildPanelList();

  setProgress(100, '加载完成');
  setTimeout(() => {
    const loading = document.getElementById('loading');
    loading.classList.add('fade-out');
    setTimeout(() => loading.remove(), 800);
  }, 300);

  // 开始15分钟刷新倒计时
  startRefreshTimer();

  // 渲染循环
  const clock = new THREE.Clock();
  function animate() {
    requestAnimationFrame(animate);
    const t = clock.getElapsedTime();
    rotX += (targetRotX - rotX) * 0.08;
    rotY += (targetRotY - rotY) * 0.08;
    if (!isDragging) targetRotY += 0.0012;
    earthMesh.rotation.x = rotX; earthMesh.rotation.y = rotY;
    markerGroup.rotation.x = rotX; markerGroup.rotation.y = rotY;
    scene.children.forEach(c => {
      if (c !== markerGroup && c.isMesh && c.geometry && c.geometry.type === 'SphereGeometry') {
        c.rotation.x = rotX;
        c.rotation.y = rotY + (c._cloudMesh ? t * 0.008 : 0);
      }
    });
    markerGroup.children.forEach(c => {
      if (c.material && c.material.uniforms && c.material.uniforms.uTime) {
        c.material.uniforms.uTime.value = t;
      }
    });
    renderer.render(scene, camera);
  }
  animate();
}

function shuffleArray(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function refreshNews() {
  NEWS = shuffleArray(NEWS_POOL).slice(0, 20);
  localStorage.setItem('globe_news_cache', JSON.stringify({ news: NEWS, ts: Date.now() }));
  buildMarkers();
  buildTicker();
  buildFilterTags();
  buildPanelList();
  updateStats();
}

function startRefreshTimer() {
  refreshTimer = 15 * 60; // 15分钟
  function tick() {
    const m = Math.floor(refreshTimer / 60).toString().padStart(2, '0');
    const s = (refreshTimer % 60).toString().padStart(2, '0');
    const timerEl = document.getElementById('refresh-timer');
    if (timerEl) timerEl.textContent = `${m}:${s}`;
    if (refreshTimer <= 0) {
      refreshNews();
      refreshTimer = 15 * 60;
    }
    refreshTimer--;
  }
  tick();
  refreshInterval = setInterval(tick, 1000);
}

function getFilteredNews() {
  if (activeFilter === '全部') return NEWS;
  return NEWS.filter(n => n.cat === activeFilter);
}

// 右侧面板
// ═══════════════════════════════════════════════
function buildFilterTags() {
  const cats = ['全部', ...new Set(NEWS.map(n => n.cat))];
  const container = document.getElementById('panel-filter');
  if (!container) return;
  container.innerHTML = cats.map(cat =>
    `<span class="filter-tag${cat === activeFilter ? ' active' : ''}" data-cat="${cat}">${cat}</span>`
  ).join('');
  container.querySelectorAll('.filter-tag').forEach(tag => {
    tag.addEventListener('click', () => {
      activeFilter = tag.dataset.cat;
      buildFilterTags();
      buildPanelList();
    });
  });
}

function buildPanelList() {
  const list = document.getElementById('panel-list');
  if (!list) return;
  const filtered = getFilteredNews();
  list.innerHTML = filtered.map((item, i) => {
    const origIdx = NEWS.indexOf(item);
    return `<div class="news-item${origIdx === activeIdx ? ' active' : ''}" data-idx="${origIdx}">
      <div class="news-item-top">
        <span class="news-cat-tag" style="background:${item.color}22;color:${item.color}">${item.cat}</span>
      </div>
      <div class="news-title">${item.title}</div>
      <div class="news-meta">
        <span>📍 ${item.region}</span>
        <span class="news-time">🕐 ${item.time}</span>
      </div>
    </div>`;
  }).join('');

  list.querySelectorAll('.news-item').forEach(el => {
    el.addEventListener('click', () => {
      const idx = parseInt(el.dataset.idx);
      activeIdx = idx;
      flyToNews(idx);
      showModal(idx);
      buildPanelList();
    });
  });
  buildCatSummary();
}

// 分类汇总
const CAT_CONFIG = [
  { cat:'股市期货', color:'#00c8ff' },
  { cat:'宏观经济', color:'#ffd700' },
  { cat:'货币政策', color:'#ff6b6b' },
  { cat:'产业动态', color:'#00ff88' },
  { cat:'国际金融', color:'#bb88ff' },
];

function buildCatSummary() {
  const el = document.getElementById('cat-summary');
  if (!el) return;
  const total = getFilteredNews().length;
  const maxCount = Math.max(1, ...CAT_CONFIG.map(c => NEWS.filter(n => n.cat === c.cat).length));
  el.innerHTML = CAT_CONFIG.map(c => {
    const count = NEWS.filter(n => n.cat === c.cat).length;
    const pct = Math.round(count / maxCount * 100);
    return `<div class="cat-summary-row">
      <div class="cat-summary-dot" style="background:${c.color}"></div>
      <span class="cat-summary-name">${c.cat}</span>
      <div class="cat-summary-bar-wrap">
        <div class="cat-summary-bar" style="width:${pct}%;background:${c.color}88"></div>
      </div>
      <span class="cat-summary-num" style="color:${c.color}">${count}</span>
    </div>`;
  }).join('');
  const listCount = document.getElementById('list-count');
  if (listCount) listCount.textContent = total;
}

function updateStats() {
  const cats = new Set(NEWS.map(n => n.cat));
  const regions = new Set(NEWS.map(n => n.region));
  const el1 = document.getElementById('stat-count');
  const el2 = document.getElementById('stat-region');
  const el3 = document.getElementById('stat-cat');
  if (el1) el1.textContent = NEWS.length;
  if (el2) el2.textContent = regions.size;
  if (el3) el3.textContent = cats.size;
}

// 详情弹窗
// ═══════════════════════════════════════════════
function showModal(idx) {
  const item = NEWS[idx];
  if (!item) return;
  document.getElementById('modal-cat').textContent = item.cat;
  document.getElementById('modal-cat').style.background = item.color + '22';
  document.getElementById('modal-cat').style.color = item.color;
  document.getElementById('modal-title').textContent = item.title;
  document.getElementById('modal-desc').textContent = item.desc;
  document.getElementById('modal-impact-text').textContent = item.impact;
  document.getElementById('modal-region').textContent = '📍 ' + item.region;
  document.getElementById('modal-time').textContent = '🕐 ' + item.time;
  document.getElementById('detail-modal').classList.add('open');
  document.getElementById('modal-overlay').classList.add('open');
}

function closeModal() {
  document.getElementById('detail-modal').classList.remove('open');
  document.getElementById('modal-overlay').classList.remove('open');
  activeIdx = -1;
  buildPanelList();
}

document.getElementById('modal-close').addEventListener('click', closeModal);
document.getElementById('modal-overlay').addEventListener('click', closeModal);

// ═══════════════════════════════════════════════
// 标注点
// ═══════════════════════════════════════════════
function latLonToVec3(lat, lon, r = 1.02) {
  const phi = (90 - lat) * Math.PI / 180;
  const theta = (lon + 180) * Math.PI / 180;
  return new THREE.Vector3(
    -r * Math.sin(phi) * Math.cos(theta),
     r * Math.cos(phi),
     r * Math.sin(phi) * Math.sin(theta)
  );
}

function buildMarkers() {
  if (markerGroup) { scene.remove(markerGroup); markerGroup = null; }
  markerMeshes = [];
  markerGroup = new THREE.Group();
  scene.add(markerGroup);

  NEWS.forEach((item, idx) => {
    const pos = latLonToVec3(item.lat, item.lon, 1.018);
    const col = new THREE.Color(item.color);

    const coreMat = new THREE.MeshBasicMaterial({ color: col });
    const coreMesh = new THREE.Mesh(new THREE.SphereGeometry(0.012, 12, 12), coreMat);
    coreMesh.position.copy(pos);
    coreMesh.userData = { newsIdx: idx };
    markerGroup.add(coreMesh);
    markerMeshes.push(coreMesh);

    // 脉冲光环
    const ringMat = new THREE.ShaderMaterial({
      uniforms: { uTime: { value: 0 }, uColor: { value: col }, uOffset: { value: idx * 0.37 } },
      vertexShader: `varying vec2 vUv; void main(){ vUv=uv; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0); }`,
      fragmentShader: `
        uniform float uTime; uniform vec3 uColor; uniform float uOffset; varying vec2 vUv;
        void main(){ vec2 c=vUv-0.5; float d=length(c); float r1=abs(d-0.35); float a1=smoothstep(0.06,0.0,r1)*0.9; float pulse=mod(uTime*0.9+uOffset,1.0); float r2=abs(d-pulse*0.5); float a2=smoothstep(0.04,0.0,r2)*(1.0-pulse)*0.8; gl_FragColor=vec4(uColor,max(a1,a2)); }`,
      transparent: true, depthWrite: false, blending: THREE.AdditiveBlending, side: THREE.DoubleSide
    });
    const ring = new THREE.Mesh(new THREE.PlaneGeometry(0.075, 0.075), ringMat);
    ring.position.copy(pos);
    ring.lookAt(pos.clone().multiplyScalar(3));
    markerGroup.add(ring);

    // 光柱
    const beamH = 0.07;
    const beamMat = new THREE.ShaderMaterial({
      uniforms: { uColor: { value: col }, uTime: { value: 0 }, uIdx: { value: idx } },
      vertexShader: `varying float vY; void main(){ vY=position.y; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0); }`,
      fragmentShader: `uniform vec3 uColor; uniform float uTime; uniform float uIdx; varying float vY; void main(){ float t=(vY+${(beamH/2).toFixed(3)})*${(1/beamH).toFixed(3)}; float pulse=0.6+0.4*sin(uTime*2.5+uIdx); gl_FragColor=vec4(uColor,t*pulse*0.85); }`,
      transparent: true, depthWrite: false, blending: THREE.AdditiveBlending, side: THREE.DoubleSide
    });
    const beam = new THREE.Mesh(new THREE.CylinderGeometry(0.0015, 0.005, beamH, 6, 1, true), beamMat);
    const beamPos = pos.clone().normalize().multiplyScalar(1.018 + beamH / 2);
    beam.position.copy(beamPos);
    beam.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0), pos.clone().normalize());
    markerGroup.add(beam);
  });
}

// ═══════════════════════════════════════════════
// 飞行定位
// ═══════════════════════════════════════════════
function flyToNews(idx) {
  const item = NEWS[idx];
  if (!item) return;
  const phi = (90 - item.lat) * Math.PI / 180;
  const theta = (item.lon + 180) * Math.PI / 180;
  const startTarget = { x: targetRotX, y: targetRotY };
  const endTarget = { x: -(phi - Math.PI / 2) * 0.5, y: -theta + Math.PI };
  const duration = 1000;
  const start = Date.now();
  function step() {
    const t = Math.min((Date.now() - start) / duration, 1);
    const e = 1 - Math.pow(1 - t, 3);
    targetRotX = startTarget.x + (endTarget.x - startTarget.x) * e;
    targetRotY = startTarget.y + (endTarget.y - startTarget.y) * e;
    if (t < 1) requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

// ═══════════════════════════════════════════════
// 弧线
// ═══════════════════════════════════════════════
function buildArcs() {
  for (let i = 0; i < Math.min(NEWS.length - 1, 8); i++) {
    const j = (i + 3) % NEWS.length;
    const p1 = latLonToVec3(NEWS[i].lat, NEWS[i].lon, 1.0);
    const p2 = latLonToVec3(NEWS[j].lat, NEWS[j].lon, 1.0);
    const mid = p1.clone().add(p2).multiplyScalar(0.5);
    mid.normalize().multiplyScalar(mid.length() + 0.25 + p1.distanceTo(p2) * 0.18);
    const curve = new THREE.QuadraticBezierCurve3(p1, mid, p2);
    const geo = new THREE.BufferGeometry().setFromPoints(curve.getPoints(60));
    const mat = new THREE.LineBasicMaterial({
      color: new THREE.Color(NEWS[i].color),
      transparent: true, opacity: 0.4,
      blending: THREE.AdditiveBlending, depthWrite: false
    });
    scene.add(new THREE.Line(geo, mat));
  }
}

// ═══════════════════════════════════════════════
// 跑马灯
// ═══════════════════════════════════════════════
function buildTicker() {
  const track = document.getElementById('ticker-track');
  if (!track) return;
  const doubled = [...NEWS, ...NEWS];
  track.innerHTML = doubled.map(item =>
    `<span class="ticker-item"><span class="ticker-dot" style="background:${item.color}"></span>【${item.region}】${item.title}</span>`
  ).join('');
}

// ═══════════════════════════════════════════════
// 云层
// ═══════════════════════════════════════════════
function buildCloudTexture() {
  const CW = 2048, CH = 1024;
  const cv = document.createElement('canvas');
  cv.width = CW; cv.height = CH;
  const cx = cv.getContext('2d');
  cx.clearRect(0, 0, CW, CH);
  const NUM = 120;
  for (let i = 0; i < NUM; i++) {
    const x = Math.random() * CW, y = Math.random() * CH;
    const rx = 20 + Math.random() * 80, ry = 10 + Math.random() * 35;
    const alpha = 0.2 + Math.random() * 0.5;
    const grd = cx.createRadialGradient(x, y, 0, x, y, Math.max(rx, ry));
    grd.addColorStop(0, `rgba(255,255,255,${alpha})`);
    grd.addColorStop(1, 'rgba(255,255,255,0)');
    cx.save();
    cx.scale(1, ry/rx);
    cx.beginPath();
    cx.arc(x, y * (rx/ry), rx, 0, Math.PI * 2);
    cx.fillStyle = grd;
    cx.fill();
    cx.restore();
  }
  return cv;
}

// ═══════════════════════════════════════════════
// 交互
// ═══════════════════════════════════════════════
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

renderer.domElement.addEventListener('mousedown', e => { isDragging=true; prevX=e.clientX; prevY=e.clientY; });
window.addEventListener('mouseup', () => isDragging=false);
window.addEventListener('mousemove', e => {
  if (isDragging) {
    targetRotY += (e.clientX - prevX) * 0.006;
    targetRotX += (e.clientY - prevY) * 0.005;
    targetRotX = Math.max(-1.2, Math.min(1.2, targetRotX));
    prevX=e.clientX; prevY=e.clientY;
  }
  checkHover(e);
});
renderer.domElement.addEventListener('wheel', e => {
  camera.position.z = Math.max(1.5, Math.min(5.0, camera.position.z + e.deltaY * 0.002));
});

let touchStart = null;
renderer.domElement.addEventListener('touchstart', e => { if(e.touches.length===1) touchStart={x:e.touches[0].clientX,y:e.touches[0].clientY}; });
renderer.domElement.addEventListener('touchmove', e => {
  if (!touchStart || e.touches.length!==1) return;
  targetRotY += (e.touches[0].clientX - touchStart.x) * 0.006;
  targetRotX += (e.touches[0].clientY - touchStart.y) * 0.005;
  targetRotX = Math.max(-1.2, Math.min(1.2, targetRotX));
  touchStart = {x:e.touches[0].clientX, y:e.touches[0].clientY};
  e.preventDefault();
}, {passive:false});

function checkHover(e) {
  if (!markerMeshes.length) return;
  mouse.x = ((e.clientX - container.getBoundingClientRect().left) / container.clientWidth) * 2 - 1;
  mouse.y = -((e.clientY - container.getBoundingClientRect().top) / container.clientHeight) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);
  raycaster.params.Points = { threshold: 0.01 };
  const hits = raycaster.intersectObjects(markerMeshes);
  if (hits.length > 0) {
    const idx = hits[0].object.userData.newsIdx;
    if (idx !== activeIdx) {
      activeIdx = idx;
      buildPanelList();
    }
  } else if (activeIdx === -1) {
    // no-op
  }
}
